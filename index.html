<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do Life Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── CSS Custom Properties: Light / Dark Themes ── */
    :root,
    [data-theme="light"] {
      --bg-gradient-a:  #e0e7ff;
      --bg-gradient-b:  #f0fdf4;
      --bg-gradient-c:  #fdf4ff;
      --glass-bg:       rgba(255,255,255,0.20);
      --glass-border:   rgba(255,255,255,0.45);
      --glass-shadow:   0 8px 32px rgba(80,80,160,0.12);
      --glass-blur:     16px;
      --glow-color:     rgba(120,120,220,0.10);
      --color-text:     #1a1a2e;
      --color-text-muted: #5a5a7a;
      --color-accent:   #5b5ef4;
      --color-accent-hover: #4345d8;
      --color-danger:   #e53935;
      --color-danger-hover: #c62828;
      --color-success:  #22c55e;
      --color-input-bg: rgba(255,255,255,0.55);
      --color-input-border: rgba(180,180,220,0.5);
      --color-check:    #5b5ef4;
      --color-tag-bg:   rgba(91,94,244,0.10);
    }

    [data-theme="dark"] {
      --bg-gradient-a:  #0f0f23;
      --bg-gradient-b:  #141428;
      --bg-gradient-c:  #1a0f2e;
      --glass-bg:       rgba(255,255,255,0.06);
      --glass-border:   rgba(255,255,255,0.10);
      --glass-shadow:   0 8px 32px rgba(0,0,0,0.45), 0 0 0 1px rgba(255,255,255,0.04);
      --glass-blur:     20px;
      --glow-color:     rgba(100,100,255,0.08);
      --color-text:     #e8e8f5;
      --color-text-muted: #8888aa;
      --color-accent:   #7c7ff5;
      --color-accent-hover: #9497f7;
      --color-danger:   #f87171;
      --color-danger-hover: #ef4444;
      --color-success:  #4ade80;
      --color-input-bg: rgba(255,255,255,0.07);
      --color-input-border: rgba(255,255,255,0.12);
      --color-check:    #7c7ff5;
      --color-tag-bg:   rgba(124,127,245,0.15);
    }

    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, var(--bg-gradient-a) 0%, var(--bg-gradient-b) 50%, var(--bg-gradient-c) 100%);
      background-attachment: fixed;
      color: var(--color-text);
      transition: background 0.2s ease, color 0.15s ease;
    }

    /* ── Glass card mixin ── */
    .glass {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 18px;
      box-shadow: var(--glass-shadow);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      transition: transform 0.15s ease, box-shadow 0.15s ease, backdrop-filter 0.15s ease;
      animation: fadeInUp 0.35s ease-out both;
    }

    .glass:hover {
      transform: translateY(-2px);
      box-shadow: var(--glass-shadow), 0 0 0 1px var(--glass-border);
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Layout ── */
    .dashboard-header {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 1rem 1.5rem;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--glass-border);
      background: var(--glass-bg);
    }

    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 24px;
      padding: 28px 24px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .widget {
      padding: 1.5rem;
      animation-delay: calc(var(--widget-i, 0) * 60ms);
    }

    .widget-title {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--color-text-muted);
      margin-bottom: 1rem;
    }

    /* ── Greeting Widget ── */
    .greeting-time {
      font-size: clamp(3rem, 8vw, 4.5rem);
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, var(--color-accent) 0%, #a78bfa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .greeting-date {
      font-size: 0.9rem;
      color: var(--color-text-muted);
      margin-top: 0.4rem;
    }

    .greeting-message {
      font-size: 1.3rem;
      font-weight: 600;
      margin-top: 0.9rem;
      color: var(--color-text);
    }

    .greeting-name-form {
      display: flex;
      gap: 0.5rem;
      margin-top: 1rem;
    }

    /* ── Focus Timer Widget ── */
    .timer-display {
      font-size: clamp(2.8rem, 7vw, 4rem);
      font-weight: 700;
      text-align: center;
      letter-spacing: 0.06em;
      margin: 0.5rem 0 0.25rem;
      color: var(--color-text);
    }

    .timer-duration-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      font-size: 0.85rem;
      color: var(--color-text-muted);
      margin-bottom: 0.75rem;
    }

    .timer-duration-row input[type="number"] {
      width: 4.5rem;
      text-align: center;
      padding: 0.3rem 0.5rem;
    }

    .timer-controls {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 0.75rem;
    }

    .timer-completion {
      text-align: center;
      color: var(--color-success);
      font-weight: 600;
      margin-top: 0.75rem;
      min-height: 1.4em;
      font-size: 0.95rem;
    }

    /* ── Stats Widget ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
      margin-top: 0.25rem;
    }

    .stat-item {
      background: var(--color-tag-bg);
      border-radius: 12px;
      padding: 0.75rem 0.5rem;
      text-align: center;
    }

    .stat-label {
      display: block;
      font-size: 0.7rem;
      font-weight: 500;
      color: var(--color-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.35rem;
    }

    .stat-value {
      display: block;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--color-accent);
      line-height: 1;
    }

    /* ── To-Do List Widget ── */
    .todo-input-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }

    .todo-sort-row {
      margin-bottom: 0.75rem;
    }

    .todo-list {
      list-style: none;
      max-height: 380px;
      overflow-y: auto;
      padding-right: 2px;
      scrollbar-width: thin;
      scrollbar-color: var(--color-input-border) transparent;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.55rem 0;
      border-bottom: 1px solid var(--glass-border);
    }

    .todo-item:last-child { border-bottom: none; }

    .todo-label-wrap { flex: 1; min-width: 0; }

    .todo-label {
      font-size: 0.95rem;
      word-break: break-word;
    }

    .todo-label.done {
      text-decoration: line-through;
      color: var(--color-text-muted);
    }

    .todo-placeholder {
      color: var(--color-text-muted);
      font-style: italic;
      text-align: center;
      padding: 1.25rem 0;
      font-size: 0.9rem;
    }

    /* ── Quick Links Widget ── */
    .links-add-form {
      display: grid;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }

    .links-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .links-placeholder {
      color: var(--color-text-muted);
      font-style: italic;
      text-align: center;
      padding: 0.75rem 0;
      font-size: 0.9rem;
    }

    .link-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      background: var(--color-tag-bg);
      border-radius: 8px;
      overflow: hidden;
    }

    .link-chip-btn {
      background: none !important;
      color: var(--color-accent) !important;
      font-weight: 500;
      font-size: 0.85rem;
      padding: 0.35rem 0.6rem 0.35rem 0.75rem !important;
      border-radius: 0 !important;
    }

    .link-chip-btn:hover { background: none !important; text-decoration: underline; }

    .link-chip-del {
      background: none !important;
      color: var(--color-text-muted) !important;
      padding: 0.35rem 0.55rem !important;
      font-size: 0.85rem;
      border-radius: 0 !important;
      line-height: 1;
    }

    .link-chip-del:hover { color: var(--color-danger) !important; background: none !important; }

    /* ── Shared Form Controls ── */
    input[type="text"],
    input[type="url"],
    input[type="number"],
    select {
      padding: 0.45rem 0.7rem;
      border: 1px solid var(--color-input-border);
      border-radius: 10px;
      background: var(--color-input-bg);
      color: var(--color-text);
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.12s ease, box-shadow 0.12s ease;
      width: 100%;
    }

    input[type="text"]:focus,
    input[type="url"]:focus,
    input[type="number"]:focus,
    select:focus {
      border-color: var(--color-accent);
      box-shadow: 0 0 0 3px rgba(91,94,244,0.15);
    }

    input[type="checkbox"] {
      width: 1.1rem;
      height: 1.1rem;
      accent-color: var(--color-check);
      cursor: pointer;
      flex-shrink: 0;
    }

    button {
      padding: 0.45rem 0.9rem;
      border: none;
      border-radius: 10px;
      background: var(--color-accent);
      color: #fff;
      font-size: 0.875rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.12s ease, transform 0.08s ease;
      white-space: nowrap;
    }

    button:hover { background: var(--color-accent-hover); }
    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    button.btn-ghost {
      background: var(--color-input-bg);
      color: var(--color-text-muted);
      border: 1px solid var(--color-input-border);
    }

    button.btn-ghost:hover {
      background: var(--color-tag-bg);
      color: var(--color-text);
    }

    button.btn-danger { background: var(--color-danger); }
    button.btn-danger:hover { background: var(--color-danger-hover); }

    button.btn-sm {
      padding: 0.25rem 0.5rem;
      font-size: 0.8rem;
      border-radius: 7px;
    }

    .error-msg {
      color: var(--color-danger);
      font-size: 0.8rem;
      margin-top: 0.3rem;
      min-height: 1.1em;
    }

    /* ── Theme Toggle ── */
    .theme-toggle {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 0.4rem 0.9rem;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--color-text);
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: background 0.12s ease, box-shadow 0.12s ease;
    }

    .theme-toggle:hover {
      box-shadow: 0 0 0 2px var(--color-accent);
      background: var(--glass-bg);
    }

    /* ── Accessibility helpers ── */
    .sr-only {
      position: absolute;
      width: 1px; height: 1px;
      padding: 0; margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .dashboard-grid { padding: 16px 12px; gap: 16px; }
      .stats-grid { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>

  <!-- ── Dashboard Header ── -->
  <header class="dashboard-header" role="banner">
    <button id="theme-toggle" class="theme-toggle" aria-label="Switch to dark theme">🌙 Dark Mode</button>
  </header>

  <!-- ── Dashboard Grid ── -->
  <main class="dashboard-grid" role="main">

    <!-- ── Greeting Widget ── -->
    <section class="widget glass" id="widget-greeting" aria-label="Greeting and clock" style="--widget-i:0">
      <p class="widget-title">Welcome</p>
      <p class="greeting-time" id="greeting-time" aria-live="polite">--:--</p>
      <p class="greeting-date" id="greeting-date"></p>
      <p class="greeting-message" id="greeting-message" aria-live="polite">Hello!</p>
      <form class="greeting-name-form" id="greeting-name-form" aria-label="Set your name">
        <label for="greeting-name-input" class="sr-only">Your name</label>
        <input type="text" id="greeting-name-input" placeholder="Enter your name…" maxlength="50" autocomplete="off" />
        <button type="submit" id="greeting-name-btn" aria-label="Save name">Save</button>
      </form>
      <p class="error-msg" id="greeting-name-error" aria-live="polite"></p>
    </section>

    <!-- ── Focus Timer Widget ── -->
    <section class="widget glass" id="widget-timer" aria-label="Focus timer" style="--widget-i:1">
      <p class="widget-title">Focus Timer</p>
      <p class="timer-display" id="timer-display" aria-live="polite" aria-atomic="true">25:00</p>
      <div class="timer-duration-row">
        <label for="timer-duration">Duration (min):</label>
        <input type="number" id="timer-duration" min="5" max="60" value="25" aria-label="Set focus timer duration in minutes" />
      </div>
      <div class="timer-controls">
        <button id="timer-start" aria-label="Start timer">▶ Start</button>
        <button id="timer-stop" class="btn-ghost" aria-label="Stop timer">⏸ Stop</button>
        <button id="timer-reset" class="btn-ghost" aria-label="Reset timer">↺ Reset</button>
      </div>
      <p class="timer-completion" id="timer-completion" aria-live="polite"></p>
    </section>

    <!-- ── Productivity Stats Widget ── -->
    <section class="widget glass" id="widget-stats" aria-label="Productivity statistics" style="--widget-i:2">
      <p class="widget-title">Stats</p>
      <div class="stats-grid">
        <div class="stat-item">
          <span class="stat-label">All-time</span>
          <span class="stat-value" id="stats-total" aria-live="polite">0</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Today</span>
          <span class="stat-value" id="stats-today" aria-live="polite">0</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Streak 🔥</span>
          <span class="stat-value" id="stats-streak" aria-live="polite">0</span>
        </div>
      </div>
    </section>

    <!-- ── To-Do List Widget ── -->
    <section class="widget glass" id="widget-todo" aria-label="To-do list" style="--widget-i:3">
      <p class="widget-title">To-Do List</p>
      <form class="todo-input-row" id="todo-add-form" aria-label="Add a task">
        <label for="todo-input" class="sr-only">New task</label>
        <input type="text" id="todo-input" placeholder="Add a task…" maxlength="255" autocomplete="off" />
        <button type="submit" id="todo-add-btn" aria-label="Add task">Add</button>
      </form>
      <p class="error-msg" id="todo-error" aria-live="polite"></p>
      <div class="todo-sort-row">
        <label for="todo-sort" class="sr-only">Sort order</label>
        <select id="todo-sort" aria-label="Sort tasks">
          <option value="default">Default order</option>
          <option value="completed-last">Completed last</option>
        </select>
      </div>
      <ul class="todo-list" id="todo-list" aria-label="Task list" aria-live="polite"></ul>
      <p class="todo-placeholder" id="todo-placeholder">No tasks yet — add one above!</p>
    </section>

    <!-- ── Quick Links Widget ── -->
    <section class="widget glass" id="widget-links" aria-label="Quick links" style="--widget-i:4">
      <p class="widget-title">Quick Links</p>
      <form class="links-add-form" id="links-add-form" aria-label="Add a quick link">
        <label for="links-label-input" class="sr-only">Link label</label>
        <input type="text" id="links-label-input" placeholder="Label (max 50 chars)" maxlength="50" autocomplete="off" />
        <label for="links-url-input" class="sr-only">URL</label>
        <input type="url" id="links-url-input" placeholder="https://example.com" autocomplete="off" />
        <button type="submit" id="links-add-btn" aria-label="Add quick link">Add Link</button>
      </form>
      <p class="error-msg" id="links-error" aria-live="polite"></p>
      <div class="links-grid" id="links-grid" aria-label="Quick links list" aria-live="polite"></div>
      <p class="links-placeholder" id="links-placeholder">No links yet — add one above!</p>
    </section>

  </main>

  <script>
    'use strict';

    window.App = {};

    // ── App.Storage ───────────────────────────────────────────────────────────
    App.Storage = (function () {
      const KEYS = {
        TASKS:          'tld_tasks',
        LINKS:          'tld_links',
        THEME:          'tld_theme',
        USERNAME:       'tld_username',
        STATS:          'tld_stats',
        TIMER_DURATION: 'tld_timer_duration',
      };
      function get(key) {
        try { const r = localStorage.getItem(key); return r === null ? null : JSON.parse(r); }
        catch (e) { return null; }
      }
      function set(key, value) {
        try { localStorage.setItem(key, JSON.stringify(value)); return true; }
        catch (e) { return false; }
      }
      function remove(key) { try { localStorage.removeItem(key); } catch (e) {} }
      return { get, set, remove, KEYS };
    })();

    // ── App.ThemeManager ──────────────────────────────────────────────────────
    App.ThemeManager = (function () {
      let _theme = 'light';
      function setTheme(t) {
        _theme = t;
        document.documentElement.setAttribute('data-theme', t);
        App.Storage.set(App.Storage.KEYS.THEME, t);
        const btn = document.getElementById('theme-toggle');
        if (btn) {
          btn.textContent = t === 'dark' ? '☀ Light Mode' : '🌙 Dark Mode';
          btn.setAttribute('aria-label', t === 'dark' ? 'Switch to light theme' : 'Switch to dark theme');
        }
      }
      function init() {
        const saved = App.Storage.get(App.Storage.KEYS.THEME);
        setTheme(saved === 'dark' ? 'dark' : 'light');
        const btn = document.getElementById('theme-toggle');
        if (btn) btn.addEventListener('click', () => setTheme(_theme === 'light' ? 'dark' : 'light'));
      }
      return { init, setTheme };
    })();

    // ── App.GreetingWidget ────────────────────────────────────────────────────
    App.GreetingWidget = (function () {
      let _userName = null;
      let _lastMin  = -1;

      function getGreeting(h) {
        if (h >= 5  && h <= 11) return 'Good Morning';
        if (h >= 12 && h <= 17) return 'Good Afternoon';
        if (h >= 18 && h <= 20) return 'Good Evening';
        return 'Good Night';
      }

      function buildMsg(h) {
        const base = getGreeting(h);
        return _userName ? base + ', ' + _userName + '!' : base + '!';
      }

      function tick() {
        const now = new Date();
        const h = now.getHours(), m = now.getMinutes();
        const elT = document.getElementById('greeting-time');
        if (elT) elT.textContent =
          String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0');
        if (m !== _lastMin) {
          _lastMin = m;
          const elD = document.getElementById('greeting-date');
          const elM = document.getElementById('greeting-message');
          if (elD) elD.textContent = now.toLocaleDateString(undefined,
            { weekday:'long', year:'numeric', month:'long', day:'numeric' });
          if (elM) elM.textContent = buildMsg(h);
        }
      }

      function renderGreeting() {
        const elM = document.getElementById('greeting-message');
        if (elM) elM.textContent = buildMsg(new Date().getHours());
      }

      function init() {
        const saved = App.Storage.get(App.Storage.KEYS.USERNAME);
        if (saved && typeof saved === 'string' && saved.trim()) _userName = saved.trim();
        _lastMin = -1;
        tick();
        setInterval(tick, 1000);

        const nameInput = document.getElementById('greeting-name-input');
        const nameForm  = document.getElementById('greeting-name-form');
        if (nameInput && _userName) nameInput.value = _userName;
        if (nameForm) {
          nameForm.addEventListener('submit', function (e) {
            e.preventDefault();
            const v = nameInput ? nameInput.value.trim() : '';
            if (v.length > 0) {
              _userName = v.slice(0, 50);
              App.Storage.set(App.Storage.KEYS.USERNAME, _userName);
            } else {
              _userName = null;
              App.Storage.remove(App.Storage.KEYS.USERNAME);
              if (nameInput) nameInput.value = '';
            }
            renderGreeting();
          });
        }
      }

      return { init, getGreeting };
    })();

    // ── App.FocusTimer ────────────────────────────────────────────────────────
    App.FocusTimer = (function () {
      const state = { durationMinutes: 25, remaining: 1500, running: false, intervalId: null };

      function fmt(s) {
        return String(Math.floor(s / 60)).padStart(2,'0') + ':' + String(s % 60).padStart(2,'0');
      }

      function render() {
        const d = document.getElementById('timer-display');
        const c = document.getElementById('timer-completion');
        if (d) d.textContent = fmt(state.remaining);
        if (c && state.running) c.textContent = '';
      }

      function tick() {
        state.remaining--;
        render();
        if (state.remaining <= 0) complete();
      }

      function start() {
        if (state.running) return;
        state.running = true;
        state.intervalId = setInterval(tick, 1000);
        const c = document.getElementById('timer-completion');
        if (c) c.textContent = '';
      }

      function stop() {
        if (!state.running) return;
        clearInterval(state.intervalId);
        state.intervalId = null;
        state.running = false;
      }

      function reset() {
        clearInterval(state.intervalId);
        state.intervalId = null;
        state.running = false;
        state.remaining = state.durationMinutes * 60;
        render();
        const c = document.getElementById('timer-completion');
        if (c) c.textContent = '';
      }

      function complete() {
        clearInterval(state.intervalId);
        state.intervalId = null;
        state.running = false;
        const d = document.getElementById('timer-display');
        const c = document.getElementById('timer-completion');
        if (d) d.textContent = '00:00';
        if (c) c.textContent = '🎉 Focus session complete!';
      }

      function applyDuration(val) {
        const n = Math.max(5, Math.min(60, parseInt(val, 10) || 25));
        state.durationMinutes = n;
        App.Storage.set(App.Storage.KEYS.TIMER_DURATION, n);
        const inp = document.getElementById('timer-duration');
        if (inp) inp.value = n;
        if (state.running) stop();
        reset();
      }

      function init() {
        const saved = App.Storage.get(App.Storage.KEYS.TIMER_DURATION);
        if (typeof saved === 'number' && saved >= 5 && saved <= 60) {
          state.durationMinutes = saved;
        }
        state.remaining = state.durationMinutes * 60;
        const inp = document.getElementById('timer-duration');
        if (inp) inp.value = state.durationMinutes;
        render();

        document.getElementById('timer-start') .addEventListener('click', start);
        document.getElementById('timer-stop')  .addEventListener('click', stop);
        document.getElementById('timer-reset') .addEventListener('click', reset);

        if (inp) {
          inp.addEventListener('blur', () => applyDuration(inp.value));
          inp.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); applyDuration(inp.value); } });
        }
      }

      return { init };
    })();

    // ── App.Stats ─────────────────────────────────────────────────────────────
    App.Stats = (function () {
      let state = { total: 0, today: 0, streak: 0, lastDate: null };

      function todayStr() { return new Date().toISOString().slice(0, 10); }

      function yesterdayStr() {
        const d = new Date(); d.setDate(d.getDate() - 1);
        return d.toISOString().slice(0, 10);
      }

      function computeStreak(s, today) {
        if (s.lastDate === today)          return { streak: s.streak, lastDate: s.lastDate };
        if (s.lastDate === yesterdayStr()) return { streak: s.streak + 1, lastDate: today };
        return { streak: 1, lastDate: today };
      }

      function renderStats() {
        const t = document.getElementById('stats-total');
        const d = document.getElementById('stats-today');
        const s = document.getElementById('stats-streak');
        if (t) t.textContent = state.total;
        if (d) d.textContent = state.today;
        if (s) s.textContent = state.streak;
      }

      function onTaskChanged() {
        const tasks = Array.isArray(App.TodoList && App.TodoList._tasks) ? App.TodoList._tasks : [];
        const today = todayStr();
        const newTotal = tasks.filter(t => t.completed).length;
        const newToday = tasks.filter(t => t.completed && t.completedDate === today).length;
        const prevToday = state.today;
        state.total = newTotal;
        state.today = newToday;
        // Increment streak on first completion of the day
        if (newToday > 0 && prevToday === 0) {
          const r = computeStreak(state, today);
          state.streak = r.streak;
          state.lastDate = r.lastDate;
        }
        App.Storage.set(App.Storage.KEYS.STATS, state);
        renderStats();
      }

      function init() {
        const saved = App.Storage.get(App.Storage.KEYS.STATS);
        if (saved && typeof saved === 'object') {
          state.total    = Number(saved.total)  || 0;
          state.today    = Number(saved.today)  || 0;
          state.streak   = Number(saved.streak) || 0;
          state.lastDate = saved.lastDate || null;
        }
        // Stale streak check
        const today = todayStr();
        if (state.lastDate && state.lastDate !== today && state.lastDate !== yesterdayStr()) {
          state.streak = 0;
        }
        renderStats();
      }

      return { init, onTaskChanged };
    })();

    // ── App.TodoList ──────────────────────────────────────────────────────────
    App.TodoList = (function () {
      const state = { tasks: [], sortOrder: 'default', editingId: null };

      function validateLabel(raw) {
        const t = (raw || '').trim();
        if (!t) return { valid: false, error: 'Task label cannot be empty.' };
        if (t.length > 255) return { valid: false, error: 'Label must be 255 chars or fewer.' };
        return { valid: true, trimmed: t };
      }

      function uid() {
        return (typeof crypto !== 'undefined' && crypto.randomUUID)
          ? crypto.randomUUID()
          : Date.now().toString(36) + Math.random().toString(36).slice(2);
      }

      function todayStr() { return new Date().toISOString().slice(0, 10); }

      function getSortedTasks() {
        if (state.sortOrder === 'completed-last') {
          const inc = state.tasks.filter(t => !t.completed).sort((a,b) => a.createdAt - b.createdAt);
          const com = state.tasks.filter(t =>  t.completed).sort((a,b) => a.createdAt - b.createdAt);
          return inc.concat(com);
        }
        return state.tasks.slice().sort((a,b) => a.createdAt - b.createdAt);
      }

      function persist() { App.Storage.set(App.Storage.KEYS.TASKS, state.tasks); }

      function render() {
        const elList = document.getElementById('todo-list');
        const elPH   = document.getElementById('todo-placeholder');
        if (!elList) return;

        const sorted = getSortedTasks();
        if (elPH) elPH.style.display = sorted.length ? 'none' : '';

        elList.innerHTML = sorted.map(task => {
          const eid = task.id.replace(/"/g,'&quot;');
          const elb = task.label.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
          const content = state.editingId === task.id
            ? `<input class="todo-edit-input" type="text" data-edit-id="${eid}" value="${elb}" maxlength="255" aria-label="Edit task" style="flex:1;padding:0.3rem 0.5rem;border-radius:8px;border:1px solid var(--color-accent);background:var(--color-input-bg);color:var(--color-text);font-family:inherit;font-size:0.9rem;outline:none;" />`
            : `<span class="todo-label${task.completed ? ' done' : ''}">${elb}</span>`;
          return `<li class="todo-item" data-id="${eid}">
            <input type="checkbox" class="todo-checkbox" data-id="${eid}" ${task.completed ? 'checked' : ''} aria-label="Toggle: ${elb}" />
            <span class="todo-label-wrap">${content}</span>
            <button class="btn-ghost btn-sm todo-edit-btn" data-id="${eid}" aria-label="Edit: ${elb}" style="padding:0.25rem 0.5rem">✏</button>
            <button class="btn-danger btn-sm todo-delete-btn" data-id="${eid}" aria-label="Delete: ${elb}" style="padding:0.25rem 0.5rem">🗑</button>
          </li>`;
        }).join('');

        if (state.editingId) {
          const inp = elList.querySelector('.todo-edit-input');
          if (inp) { inp.focus(); const l = inp.value.length; inp.setSelectionRange(l, l); }
        }

        if (!elList._evBound) {
          elList._evBound = true;

          elList.addEventListener('click', e => {
            if (e.target.classList.contains('todo-checkbox')) {
              toggleComplete(e.target.getAttribute('data-id')); return;
            }
            const editBtn = e.target.closest('.todo-edit-btn');
            if (editBtn) { state.editingId = editBtn.getAttribute('data-id'); render(); return; }
            const delBtn = e.target.closest('.todo-delete-btn');
            if (delBtn) { deleteTask(delBtn.getAttribute('data-id')); return; }
          });

          elList.addEventListener('keydown', e => {
            if (!e.target.classList.contains('todo-edit-input')) return;
            const id = e.target.getAttribute('data-edit-id');
            if (e.key === 'Enter')  { e.preventDefault(); editTask(id, e.target.value); }
            if (e.key === 'Escape') { e.preventDefault(); state.editingId = null; render(); }
          });

          elList.addEventListener('focusout', e => {
            if (!e.target.classList.contains('todo-edit-input')) return;
            if (state.editingId === null) return;
            editTask(e.target.getAttribute('data-edit-id'), e.target.value);
          });
        }
      }

      function addTask(label) {
        const err = document.getElementById('todo-error');
        const res = validateLabel(label);
        if (!res.valid) { if (err) err.textContent = res.error; return; }
        // Duplicate check
        if (state.tasks.some(t => t.label.trim().toLowerCase() === res.trimmed.toLowerCase())) {
          if (err) err.textContent = 'Task already exists.'; return;
        }
        if (err) err.textContent = '';
        state.tasks.push({ id: uid(), label: res.trimmed, completed: false, createdAt: Date.now(), completedDate: null });
        persist();
        render();
      }

      function editTask(id, newLabel) {
        const res = validateLabel(newLabel);
        state.editingId = null;
        if (res.valid) {
          const t = state.tasks.find(t => t.id === id);
          if (t) { t.label = res.trimmed; persist(); }
        }
        render();
      }

      function toggleComplete(id) {
        const t = state.tasks.find(t => t.id === id);
        if (t) {
          t.completed = !t.completed;
          t.completedDate = t.completed ? todayStr() : null;
          persist();
        }
        render();
        if (App.Stats) App.Stats.onTaskChanged();
      }

      function deleteTask(id) {
        state.tasks = state.tasks.filter(t => t.id !== id);
        persist();
        render();
        if (App.Stats) App.Stats.onTaskChanged();
      }

      function init() {
        const saved = App.Storage.get(App.Storage.KEYS.TASKS);
        state.tasks = Array.isArray(saved) ? saved.map(t => ({ completedDate: null, ...t })) : [];
        render();

        const form  = document.getElementById('todo-add-form');
        const input = document.getElementById('todo-input');
        if (form && input) {
          form.addEventListener('submit', e => {
            e.preventDefault();
            addTask(input.value);
            if (validateLabel(input.value).valid) input.value = '';
          });
        }

        const sortEl = document.getElementById('todo-sort');
        if (sortEl) {
          sortEl.value = state.sortOrder;
          sortEl.addEventListener('change', () => { state.sortOrder = sortEl.value; render(); });
        }
      }

      // Expose _tasks for App.Stats
      Object.defineProperty(App.TodoList || {}, '_tasks', { get: () => state.tasks });

      return { init, validateLabel, addTask, editTask, toggleComplete, deleteTask, getSortedTasks,
               get _tasks() { return state.tasks; } };
    })();

    // ── App.QuickLinks ────────────────────────────────────────────────────────
    App.QuickLinks = (function () {
      const state = { links: [] };

      function uid() {
        return (typeof crypto !== 'undefined' && crypto.randomUUID)
          ? crypto.randomUUID()
          : Date.now().toString(36) + Math.random().toString(36).slice(2);
      }

      function validateLink(label, url) {
        if (!(label || '').trim()) return { valid: false, error: 'Label required.' };
        const u = (url || '').trim();
        if (!u.startsWith('http://') && !u.startsWith('https://'))
          return { valid: false, error: 'URL must start with http:// or https://' };
        return { valid: true };
      }

      function render() {
        const grid = document.getElementById('links-grid');
        const ph   = document.getElementById('links-placeholder');
        if (!grid) return;
        grid.innerHTML = '';
        if (state.links.length === 0) { if (ph) ph.style.display = ''; return; }
        if (ph) ph.style.display = 'none';
        state.links.forEach(link => {
          const chip = document.createElement('span');
          chip.className = 'link-chip';

          const disp = link.label.length > 50 ? link.label.slice(0,50) + '…' : link.label;
          const linkBtn = document.createElement('button');
          linkBtn.className = 'link-chip-btn';
          linkBtn.textContent = disp;
          linkBtn.title = link.label;
          if (!link.valid) {
            linkBtn.disabled = true;
            linkBtn.setAttribute('aria-disabled', 'true');
          } else {
            linkBtn.addEventListener('click', () => window.open(link.url, '_blank', 'noopener,noreferrer'));
          }

          const del = document.createElement('button');
          del.className = 'link-chip-del';
          del.textContent = '×';
          del.setAttribute('data-id', link.id);
          del.setAttribute('aria-label', 'Delete link: ' + link.label);
          del.addEventListener('click', () => deleteLink(link.id));

          chip.appendChild(linkBtn);
          chip.appendChild(del);
          grid.appendChild(chip);
        });
      }

      function addLink(label, url) {
        const err = document.getElementById('links-error');
        const res = validateLink(label, url);
        if (!res.valid) { if (err) err.textContent = res.error; return; }
        if (err) err.textContent = '';
        const truncated = (label || '').trim().slice(0, 50);
        state.links.push({ id: uid(), label: truncated, url: (url || '').trim(), valid: true });
        const ok = App.Storage.set(App.Storage.KEYS.LINKS, state.links);
        if (!ok && err) err.textContent = '⚠ Could not save — storage may be full.';
        render();
      }

      function deleteLink(id) {
        state.links = state.links.filter(l => l.id !== id);
        App.Storage.set(App.Storage.KEYS.LINKS, state.links);
        render();
      }

      function init() {
        const saved = App.Storage.get(App.Storage.KEYS.LINKS);
        if (Array.isArray(saved)) {
          state.links = saved.map(l => {
            const u = (l.url || '').trim();
            return { id: l.id || uid(), label: l.label || '', url: u,
                     valid: u.startsWith('http://') || u.startsWith('https://') };
          });
        }
        render();

        const form  = document.getElementById('links-add-form');
        const lInp  = document.getElementById('links-label-input');
        const uInp  = document.getElementById('links-url-input');
        if (form && lInp && uInp) {
          form.addEventListener('submit', e => {
            e.preventDefault();
            const prev = state.links.length;
            addLink(lInp.value, uInp.value);
            if (state.links.length > prev) { lInp.value = ''; uInp.value = ''; }
          });
        }
      }

      return { init, validateLink, addLink, deleteLink };
    })();

    // ── Bootstrap ─────────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', function () {
      App.ThemeManager.init();
      App.GreetingWidget.init();
      App.FocusTimer.init();
      App.Stats.init();
      App.TodoList.init();
      App.QuickLinks.init();
      // Sync stats after tasks are loaded
      App.Stats.onTaskChanged();
    });
  </script>
</body>
